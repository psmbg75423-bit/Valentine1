<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Will You Be My Valentine? 🐼❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap');

    /* ── CSS Variables ── */
    :root {
      --pink-light: #ffd6e0;
      --pink-mid:   #ff85a1;
      --pink-deep:  #e8415a;
      --red-hot:    #c0152b;
      --cream:      #fff5f7;
      --white:      #ffffff;
      --shadow:     rgba(200,20,60,0.25);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; }

    body {
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg,#ffe0ea 0%,#ffb3c6 30%,#ff758c 65%,#c9184a 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      touch-action: pan-y;
    }

    /* ── Floating BG Hearts ── */
    .bg-hearts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .bg-heart {
      position: absolute; bottom: -80px;
      font-size: 1.4rem; opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.8) rotate(-10deg); opacity: 0; }
      10%  { opacity: 0.55; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-115vh) scale(1.1) rotate(12deg); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 32px;
      padding: 52px 48px 44px;
      max-width: 500px; width: 92%;
      text-align: center;
      box-shadow: 0 20px 60px var(--shadow), 0 2px 8px rgba(0,0,0,0.08);
      animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Panda on Card ── */
    .panda-main {
      font-size: 4.5rem;
      display: block;
      margin-bottom: 4px;
      animation: pandaIdle 2.2s ease-in-out infinite;
    }
    @keyframes pandaIdle {
      0%,100% { transform: rotate(-5deg) scale(1);    }
      25%     { transform: rotate(5deg)  scale(1.08); }
      50%     { transform: rotate(-4deg) scale(1);    }
      75%     { transform: rotate(4deg)  scale(1.06); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem,5vw,2.2rem);
      color: var(--red-hot);
      line-height: 1.25;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .sub {
      font-size: 0.92rem; color: #b5294a;
      margin-bottom: 36px; font-weight: 300;
      letter-spacing: 0.03em;
    }

    /* ── Buttons row ── */
    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    /* ── YES Button ── */
    .btn-yes {
      position: relative;
      padding: 15px 42px;
      font-size: 1.1rem; font-family: 'Lato', sans-serif;
      font-weight: 700; letter-spacing: 0.05em;
      color: var(--white);
      background: linear-gradient(135deg,#ff758c 0%,#c9184a 100%);
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 22px rgba(201,24,74,0.38);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      overflow: hidden;
      animation: yesGlow 2s ease-in-out infinite;
    }
    @keyframes yesGlow {
      0%,100% { box-shadow: 0 6px 22px rgba(201,24,74,0.38); }
      50%     { box-shadow: 0 8px 32px rgba(201,24,74,0.7), 0 0 0 6px rgba(255,117,140,0.18); }
    }
    .btn-yes:hover {
      transform: translateY(-3px) scale(1.05);
      filter: brightness(1.1);
    }
    .btn-yes:active { transform: scale(0.96); }

    /* ── NO Button (fixed, floats) ── */
    .btn-no {
      position: fixed;
      padding: 15px 42px;
      font-size: 1.1rem; font-family: 'Lato', sans-serif;
      font-weight: 700; letter-spacing: 0.05em;
      color: #c9184a;
      background: rgba(255,255,255,0.88);
      border: 2px solid var(--pink-mid);
      border-radius: 50px; cursor: not-allowed;
      box-shadow: 0 4px 14px rgba(201,24,74,0.15);
      z-index: 50;
      animation: noFloat 3s ease-in-out infinite;
      user-select: none;
      -webkit-user-select: none;
    }
    @keyframes noFloat {
      0%,100% { transform: translateY(0px) rotate(-1deg); }
      33%     { transform: translateY(-10px) rotate(1.5deg); }
      66%     { transform: translateY(-5px) rotate(-1.5deg); }
    }

    /* ── Modal Overlay ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(180,20,60,0.38);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    /* ── Modal Box ── */
    .modal {
      background: rgba(255,255,255,0.95);
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 28px;
      padding: 44px 40px 36px;
      max-width: 420px; width: 90%;
      text-align: center;
      box-shadow: 0 28px 80px rgba(201,24,74,0.38);
      animation: popIn 0.55s cubic-bezier(.34,1.56,.64,1) both;
      position: relative; overflow: hidden;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(0.4) rotate(-6deg); }
      to   { opacity:1; transform:scale(1)   rotate(0deg);  }
    }

    /* ── Panda Celebration in Modal ── */
    .panda-stage {
      position: relative;
      height: 130px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }
    .panda-celebrate {
      font-size: 5rem;
      display: inline-block;
      animation: pandaDance 0.6s ease-in-out infinite alternate;
    }
    @keyframes pandaDance {
      from { transform: scale(1)    rotate(-12deg) translateY(0); }
      to   { transform: scale(1.18) rotate(12deg)  translateY(-14px); }
    }
    /* shower spray drops */
    .spray { position: absolute; font-size: 1.4rem; animation: sprayOut linear infinite; }
    @keyframes sprayOut {
      0%   { transform: translate(0,0) scale(0.5); opacity:1; }
      100% { transform: translate(var(--tx),var(--ty)) scale(1.2); opacity:0; }
    }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; color: var(--red-hot);
      margin-bottom: 10px;
    }
    .modal p {
      color: #b5294a; font-size: 0.97rem;
      font-weight: 300; margin-bottom: 26px; line-height: 1.6;
    }
    .modal-close {
      padding: 13px 34px;
      background: linear-gradient(135deg,#ff758c,#c9184a);
      color: #fff; border: none; border-radius: 50px;
      font-size: 1rem; cursor: pointer;
      font-family: 'Lato', sans-serif; font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: 0 6px 22px rgba(201,24,74,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .modal-close:hover { transform: scale(1.07); box-shadow: 0 10px 30px rgba(201,24,74,0.5); }

    /* ── Confetti Canvas ── */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 199;
    }

    /* ── Responsive ── */
    @media (max-width: 440px) {
      .card { padding: 38px 22px 32px; }
      .modal { padding: 36px 22px 28px; }
      .btn-yes, .btn-no { padding: 13px 30px; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Background drifting hearts -->
  <div class="bg-hearts" id="bgHearts"></div>

  <!-- Main Card -->
  <div class="card">
    <span class="panda-main">🐼</span>
    <h1>Will you be my Valentine? ❤️</h1>
    <p class="sub">The panda is nervously waiting… 🐼💕</p>
    <div class="buttons">
      <button class="btn-yes" id="btnYes">YES 💖</button>
      <!-- NO placeholder (actual button is fixed positioned below) -->
      <span style="width:130px;height:52px;display:inline-block;"></span>
    </div>
  </div>

  <!-- NO Button (fixed, roaming) -->
  <button class="btn-no" id="btnNo">NO 😢</button>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalBox">
      <!-- Panda shower celebration -->
      <div class="panda-stage" id="pandaStage">
        <span class="panda-celebrate">🐼</span>
      </div>
      <h2>Yayyy! 🐼💕</h2>
      <p>The panda is doing a happy shower dance!<br>Happy Valentine's Day ❤️<br>You just made us both so happy! 🌹</p>
      <button class="modal-close" id="modalClose">Awww! 💖 Close</button>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <script>
    /* ══════════════════════════════════════════
       SECTION 1 – BACKGROUND FLOATING HEARTS
    ══════════════════════════════════════════ */
    const bgHearts   = document.getElementById('bgHearts');
    const heartEmoji = ['❤️','💕','💖','💗','💓','🩷','💞','🐼'];

    function spawnBgHeart() {
      const el = document.createElement('span');
      el.classList.add('bg-heart');
      el.textContent = heartEmoji[Math.floor(Math.random() * heartEmoji.length)];
      const size = 1 + Math.random() * 1.5;
      const dur  = 8 + Math.random() * 12;
      const del  = Math.random() * 8;
      el.style.cssText = `left:${Math.random()*100}%;font-size:${size}rem;animation-duration:${dur}s;animation-delay:${del}s;`;
      bgHearts.appendChild(el);
      setTimeout(() => el.remove(), (dur + del) * 1000);
    }
    for (let i = 0; i < 20; i++) spawnBgHeart();
    setInterval(spawnBgHeart, 1100);


    /* ══════════════════════════════════════════
       SECTION 2 – ESCAPING NO BUTTON
       Works for both mouse (desktop) and touch (mobile)
    ══════════════════════════════════════════ */
    const btnNo = document.getElementById('btnNo');

    // Store current position
    let noX = 0, noY = 0;
    let noW = 0, noH = 0;
    let placed = false;

    // Place NO button near the card initially
    function initNoPos() {
      noW = btnNo.offsetWidth;
      noH = btnNo.offsetHeight;
      // Default: right of center
      noX = Math.min(window.innerWidth  / 2 + 80, window.innerWidth  - noW - 20);
      noY = Math.max(window.innerHeight / 2 - noH / 2, 20);
      applyNoPos(false);
      placed = true;
    }

    function applyNoPos(animate = true) {
      // Clamp within viewport
      noX = Math.max(16, Math.min(window.innerWidth  - noW - 16, noX));
      noY = Math.max(16, Math.min(window.innerHeight - noH - 16, noY));
      btnNo.style.transition = animate
        ? 'left 0.28s cubic-bezier(.22,1,.36,1), top 0.28s cubic-bezier(.22,1,.36,1)'
        : 'none';
      btnNo.style.left = noX + 'px';
      btnNo.style.top  = noY + 'px';
    }

    function fleeFrom(cursorX, cursorY) {
      noW = btnNo.offsetWidth;
      noH = btnNo.offsetHeight;
      const btnCX = noX + noW / 2;
      const btnCY = noY + noH / 2;
      const dx = cursorX - btnCX;
      const dy = cursorY - btnCY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const FLEE_R = 160;

      if (dist < FLEE_R) {
        const angle = Math.atan2(dy, dx) + Math.PI + (Math.random() - 0.5) * 1.4;
        const speed = 150 + Math.random() * 120;
        noX += Math.cos(angle) * speed;
        noY += Math.sin(angle) * speed;
        applyNoPos(true);
      }
    }

    // Desktop: mousemove
    document.addEventListener('mousemove', (e) => {
      if (!placed) return;
      fleeFrom(e.clientX, e.clientY);
    });

    // Mobile: touchstart – flee immediately on touch near button
    document.addEventListener('touchstart', (e) => {
      if (!placed) return;
      const t = e.touches[0];
      fleeFrom(t.clientX, t.clientY);
    }, { passive: true });

    // Mobile: touchmove – keep fleeing as finger moves
    document.addEventListener('touchmove', (e) => {
      if (!placed) return;
      const t = e.touches[0];
      fleeFrom(t.clientX, t.clientY);
    }, { passive: true });

    // Block all clicks / touches on NO button
    btnNo.addEventListener('click',      (e) => { e.preventDefault(); e.stopPropagation(); });
    btnNo.addEventListener('touchend',   (e) => { e.preventDefault(); e.stopPropagation(); fleeFrom(noX + noW/2, noY + noH/2 - 50); }, { passive: false });
    btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); fleeFrom(noX + noW/2, noY + noH/2 - 50); }, { passive: false });

    window.addEventListener('resize', () => { placed = false; initNoPos(); });
    // Init after fonts/layout settle
    window.addEventListener('load', () => setTimeout(initNoPos, 100));
    setTimeout(initNoPos, 200); // fallback


    /* ══════════════════════════════════════════
       SECTION 3 – YES BUTTON → MODAL + PANDA
    ══════════════════════════════════════════ */
    const btnYes       = document.getElementById('btnYes');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose   = document.getElementById('modalClose');
    const pandaStage   = document.getElementById('pandaStage');

    const sprayItems = ['💧','💕','❤️','🌸','✨','💦','🩷'];
    let sprayEls = [];

    function buildSpray() {
      // Remove old
      sprayEls.forEach(e => e.remove()); sprayEls = [];
      const count = 10;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('span');
        el.classList.add('spray');
        el.textContent = sprayItems[i % sprayItems.length];
        const angle = (i / count) * Math.PI * 2;
        const dist  = 55 + Math.random() * 50;
        const tx    = Math.cos(angle) * dist;
        const ty    = Math.sin(angle) * dist - 20;
        const dur   = 0.7 + Math.random() * 0.6;
        const del   = Math.random() * 0.5;
        el.style.cssText = `
          --tx: ${tx}px; --ty: ${ty}px;
          left: 50%; top: 50%;
          transform: translate(-50%,-50%);
          animation-duration: ${dur}s;
          animation-delay: ${del}s;
          animation-iteration-count: infinite;
        `;
        pandaStage.appendChild(el);
        sprayEls.push(el);
      }
    }

    btnYes.addEventListener('click', () => {
      buildSpray();
      modalOverlay.classList.add('show');
      startConfetti();
    });

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

    function closeModal() {
      modalOverlay.classList.remove('show');
      stopConfetti();
      sprayEls.forEach(e => e.remove()); sprayEls = [];
    }


    /* ══════════════════════════════════════════
       SECTION 4 – CONFETTI ENGINE (pure canvas)
    ══════════════════════════════════════════ */
    const canvas  = document.getElementById('confetti-canvas');
    const ctx     = canvas.getContext('2d');
    let animId    = null;
    let running   = false;
    const pieces  = [];

    const COLORS = ['#ff758c','#ff4d6d','#c9184a','#ffb3c6','#ff0a54','#ffd6e0','#fff0f3','#e63946','#ffccd5'];
    const SHAPES = ['circle','rect','heart'];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    class Piece {
      constructor() { this.reset(true); }
      reset(init = false) {
        this.x      = Math.random() * canvas.width;
        this.y      = init ? Math.random() * -canvas.height : -20;
        this.size   = 7 + Math.random() * 11;
        this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.shape  = SHAPES[Math.floor(Math.random() * SHAPES.length)];
        this.vx     = (Math.random() - 0.5) * 2.5;
        this.vy     = 2.8 + Math.random() * 3.5;
        this.angle  = Math.random() * Math.PI * 2;
        this.spin   = (Math.random() - 0.5) * 0.18;
        this.alpha  = 0.8 + Math.random() * 0.2;
        this.wobble = Math.random() * Math.PI * 2;
      }
      update() {
        this.wobble += 0.06;
        this.x += this.vx + Math.sin(this.wobble) * 0.8;
        this.y += this.vy;
        this.angle += this.spin;
        if (this.y > canvas.height + 30) this.reset();
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        if (this.shape === 'circle') {
          ctx.beginPath(); ctx.arc(0,0,this.size/2,0,Math.PI*2); ctx.fill();
        } else if (this.shape === 'rect') {
          ctx.fillRect(-this.size/2, -this.size/4, this.size, this.size/2);
        } else {
          // Heart
          const s = this.size / 2;
          ctx.beginPath();
          ctx.moveTo(0, s * 0.4);
          ctx.bezierCurveTo( s, -s*0.4,  s*1.5,  s*0.5, 0,  s*1.4);
          ctx.bezierCurveTo(-s*1.5,  s*0.5, -s, -s*0.4, 0,  s*0.4);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function startConfetti() {
      if (running) return;
      running = true; pieces.length = 0;
      for (let i = 0; i < 180; i++) pieces.push(new Piece());
      loop();
    }
    function loop() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p => { p.update(); p.draw(); });
      if (running) animId = requestAnimationFrame(loop);
    }
    function stopConfetti() {
      running = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  </script>
</body>
</html>
